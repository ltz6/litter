name: Android

on:
  pull_request:
    paths:
      - 'apps/android/**'
      - 'shared/rust-bridge/**'
      - '.github/workflows/android.yml'
  push:
    branches: [ main ]
    paths:
      - 'apps/android/**'
      - 'shared/rust-bridge/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms and NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;30.0.14904198"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        env:
          SCCACHE_BUCKET: rust-cache
          SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_R2_ENDPOINT }}
          SCCACHE_REGION: auto
          SCCACHE_S3_USE_SSL: "true"
          SCCACHE_S3_KEY_PREFIX: ci/android
          AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust JNI libs
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198
          RUSTC_WRAPPER: sccache
        run: make rust-android

      - name: Generate UniFFI Kotlin bindings
        run: make bindings-kotlin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug
        run: apps/android/gradlew -p apps/android :app:assembleDebug
